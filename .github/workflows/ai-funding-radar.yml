name: AI Funding Radar

on:
  schedule:
    - cron: '30 1 * * *'  # 7:00 AM IST = 01:30 UTC
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to fetch fundings for (YYYY-MM-DD), leave blank for today'
        required: false
        default: ''

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install 'anthropic>=0.92.0' httpx

      - name: Trigger AI Funding Radar session
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python trigger.py --date "${{ github.event.inputs.date }}"
