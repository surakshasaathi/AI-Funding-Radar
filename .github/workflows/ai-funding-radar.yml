- name: Install dependencies
  run: pip install 'anthropic>=0.92.0' httpx   # add httpx

- name: Trigger AI Funding Radar session
  env:
    ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}    # add this
  run: python trigger.py --date "${{ github.event.inputs.date }}"
